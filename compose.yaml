include:
  - infra.yaml

services:
  app:
    build: .
    container_name: rag-app
    ports:
      - "${APP_PORT}:8000"
    networks:
      - rag-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      start_period: 30s
      interval: 10s
      retries: 5
      timeout: 10s

networks:
  rag-net:
