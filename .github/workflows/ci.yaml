name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.25"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --no-default-groups --group tool

      - name: Check type with ty
        run: uv run ty check --error-on-warning --output-format=github

      - name: Lint with Ruff
        run: uv run ruff check --output-format=github

      - name: Check format with Ruff
        run: uv run ruff format --diff

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.25"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --no-default-groups --group dev

      - name: Test with pytest
        run: uv run pytest --junitxml=test-report.xml --cov

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: Pytest Report
          report-title: Pytest Report
          path: test-report.xml
          reporter: python-xunit

      - name: Publish coverage report
        uses: py-cov-action/python-coverage-comment-action@v3
        if: ${{ !cancelled() }}
        with:
          GITHUB_TOKEN: ${{ github.token }}
          ANNOTATE_MISSING_LINES: true
